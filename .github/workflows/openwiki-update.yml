name: OpenWiki Update

on:
  schedule:
    - cron: '0 6 * * *'  # daily at 6am UTC
  workflow_dispatch:       # manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install -g openwiki
      - name: Update documentation
        env:
          OPENWIKI_PROVIDER: openrouter
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENWIKI_MODEL_ID: deepseek/deepseek-chat
        run: openwiki --update -p "Update documentation to reflect latest code changes"
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'docs: openwiki auto-update'
          title: 'docs: OpenWiki daily update'
          branch: openwiki-update
          delete-branch: true
