<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Branch Live — Reset Password</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg-primary:#06060c;--bg-secondary:#0e0e18;--bg-tertiary:#1a1a2e;--accent-primary:#8b5cf6;--accent-secondary:#00d4aa;--accent-danger:#ef4444;--text-primary:#f1f5f9;--text-secondary:#94a3b8;--text-muted:#475569;--border:#1e293b;/* Legacy aliases */--bg:var(--bg-primary);--panel:var(--bg-secondary);--brand:var(--accent-primary);--brand2:var(--accent-secondary);--text:var(--text-primary);--muted:var(--text-muted);--red:var(--accent-danger)}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.container{background:var(--panel);border:1px solid var(--border);border-radius:20px;padding:48px 40px;width:100%;max-width:440px}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:32px}
.logo svg{width:40px;height:40px}
h1{font-size:1.5em;margin-bottom:6px}
.sub{color:var(--muted);font-size:0.9em;margin-bottom:28px}
label{display:block;font-size:0.85em;font-weight:500;margin-bottom:6px;color:var(--muted)}
input{width:100%;padding:12px 14px;background:var(--bg-tertiary);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:0.95em;margin-bottom:16px;font-family:inherit;transition:border-color 0.2s}
input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(139,92,246,0.15)}
.btn{width:100%;padding:14px;background:var(--accent-primary);color:#fff;border:none;border-radius:12px;font-size:1em;font-weight:700;cursor:pointer;font-family:inherit;transition:filter 0.2s,box-shadow 0.2s}
.btn:hover{filter:brightness(1.1);box-shadow:0 4px 16px rgba(139,92,246,0.3)}
.btn:active{transform:scale(0.98)}
.btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.error{color:var(--red);font-size:0.85em;min-height:20px;margin-bottom:12px}
.success{color:var(--brand2);font-size:0.85em;min-height:20px;margin-bottom:12px}
.back{display:block;text-align:center;margin-top:20px;color:var(--muted);font-size:0.85em;text-decoration:none}
.back:hover{color:var(--text)}
.hidden{display:none}
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <svg width="40" height="40" viewBox="0 0 72 72" fill="none">
      <line x1="36" y1="52" x2="36" y2="30" stroke="url(#sg)" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M36 28 Q18 22 12 14 Q18 22 36 28" fill="#8b5cf6" opacity="0.9"/>
      <path d="M36 28 Q54 22 60 14 Q54 22 36 28" fill="#00d4aa" opacity="0.9"/>
      <defs><linearGradient id="sg" x1="0" y1="0" x2="72" y2="72"><stop stop-color="#8b5cf6"/><stop offset="1" stop-color="#00d4aa"/></linearGradient></defs>
    </svg>
    <span style="font-weight:700;font-size:1.1em">Branch Live</span>
  </div>

  <div class="error" id="error"></div>
  <div class="success" id="success"></div>

  <!-- Forgot Password form (no token) -->
  <div id="forgot-form">
    <h1>Forgot Password?</h1>
    <p class="sub">Enter your email and we'll send you a reset link.</p>

    <label for="forgot-email">Email</label>
    <input type="email" id="forgot-email" placeholder="you@company.com" required>

    <button class="btn" onclick="forgotPassword()">Send Reset Link →</button>
  </div>

  <!-- Reset Password form (token present) -->
  <div id="reset-form" class="hidden">
    <h1>Reset Password</h1>
    <p class="sub">Choose a new password for your account.</p>

    <label for="new-pw">New Password</label>
    <input type="password" id="new-pw" placeholder="At least 6 characters" minlength="6" required>

    <label for="confirm-pw">Confirm Password</label>
    <input type="password" id="confirm-pw" placeholder="Re-enter password" minlength="6" required>

    <button class="btn" onclick="resetPassword()">Reset Password →</button>
  </div>

  <a href="/" class="back">← Back to Branch Live</a>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const token = params.get('token');

if (token) {
  document.getElementById('forgot-form').classList.add('hidden');
  document.getElementById('reset-form').classList.remove('hidden');
}

async function forgotPassword() {
  const email = document.getElementById('forgot-email').value.trim();
  const btn = document.querySelector('#forgot-form .btn');
  const err = document.getElementById('error');
  const ok = document.getElementById('success');
  err.textContent = ''; ok.textContent = '';

  if (!email) {
    err.textContent = 'Please enter your email address.';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Sending...';

  try {
    const r = await fetch('/api/forgot-password', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email})
    });
    const d = await r.json();
    if (d.ok) {
      ok.textContent = d.message || 'Reset link sent! Check your email.';
    } else {
      err.textContent = d.error || 'Something went wrong.';
    }
  } catch(e) {
    err.textContent = 'Connection error — please try again.';
  }
  btn.disabled = false;
  btn.textContent = 'Send Reset Link →';
}

async function resetPassword() {
  const pw = document.getElementById('new-pw').value;
  const confirm = document.getElementById('confirm-pw').value;
  const btn = document.querySelector('#reset-form .btn');
  const err = document.getElementById('error');
  const ok = document.getElementById('success');
  err.textContent = ''; ok.textContent = '';

  if (pw.length < 6) {
    err.textContent = 'Password must be at least 6 characters.';
    return;
  }
  if (pw !== confirm) {
    err.textContent = 'Passwords do not match.';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Resetting...';

  try {
    const r = await fetch('/api/reset-password', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({token, password: pw})
    });
    const d = await r.json();
    if (d.ok) {
      ok.textContent = 'Password reset! Redirecting to login...';
      setTimeout(() => { window.location.href = '/'; }, 2000);
    } else {
      err.textContent = d.error || 'Something went wrong.';
    }
  } catch(e) {
    err.textContent = 'Connection error — please try again.';
  }
  btn.disabled = false;
  btn.textContent = 'Reset Password →';
}
</script>
</body>
</html>
