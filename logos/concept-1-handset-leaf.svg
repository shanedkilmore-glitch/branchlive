<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" role="img" aria-label="Branch Live logo — phone handset with a leaf growing from it">
  <title>Branch Live — Concept 1: Handset with Leaf</title>
  <defs>
    <!-- Purple handset gradient -->
    <linearGradient id="bl1-purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <!-- Leaf gradient: nature green into brand violet -->
    <linearGradient id="bl1-leaf" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <!-- Soft glow -->
    <filter id="bl1-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Dark app-icon background -->
  <rect width="240" height="240" rx="48" fill="#0d1117"/>

  <!-- Phone handset: a smile-shaped receiver bar -->
  <g filter="url(#bl1-glow)">
    <path d="M 52 112 Q 120 184 188 112"
          fill="none" stroke="url(#bl1-purple)" stroke-width="40"
          stroke-linecap="round"/>
  </g>

  <!-- Leaf sprig growing from the left end of the handset -->
  <g transform="translate(50,112)">
    <!-- main stem -->
    <path d="M 0 0 C -6 -34 -2 -64 10 -92" fill="none"
          stroke="#5eead4" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
    <!-- main leaf -->
    <g transform="translate(6,-74) rotate(28)">
      <path d="M 0 0 C 26 12 26 50 0 64 C -26 50 -26 12 0 0 Z" fill="url(#bl1-leaf)"/>
      <path d="M 0 6 L 0 58" stroke="#0d1117" stroke-width="2.5" opacity="0.55"/>
    </g>
    <!-- smaller side leaf -->
    <g transform="translate(-2,-44) rotate(-32)">
      <path d="M 0 0 C 18 8 18 34 0 44 C -18 34 -18 8 0 0 Z" fill="url(#bl1-leaf)" opacity="0.95"/>
    </g>
  </g>
</svg>
